<div class="component">
  @if (rule != null) {
    <div class="card outer w-100" [class.active]="expand">
      <div class="card-header clickable" (click)="toggleDetails()">
        <div class="card-title">{{rule.name}}</div>
      </div>
      @if (expand) {
        <div class="card-body">
          @for (subsection of rule.subsections; track subsection) {
            <div [id]="subsection.index">
              <div class="card inner w-100" [class.active]="shownSubsection==subsection.index">
                <div class="inner card-header clickable" (click)="showSubsection(subsection.index)">
                  <div class="card-title">{{subsection.name}}</div>
                </div>
                <div class="inner card-body hidden" [class.hidden]="shownSubsection!=subsection.index">
                  <div [innerHtml]="domSanitizer.bypassSecurityTrustHtml(subsection.desc)"></div>
                  @if (subsection.page) {
                    <div>{{subsection.book}} (page {{subsection.page}})</div>
                  }
                </div>
              </div>
            </div>
          }
        </div>
      }
    </div>
  }
</div>
