@if (condition != null) {
  <div class="card w-100" [class.active]="expand">
    <div class="card-header clickable" (click)="toggleDetails()">
      <div class="card-title">{{condition.name}}</div>
    </div>
    @if (expand) {
      <div class="card-body">
        <div class="card-text removeExtraLine">
          @for (desc of condition.desc; track desc) {
            <span>
              {{desc}}<br /><br />
            </span>
          }
        </div>
      </div>
    }
  </div>
}
