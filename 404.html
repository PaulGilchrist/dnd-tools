<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Page Not Found</title>
  <script type="text/javascript">
    // Redirect all unknown routes to index.html with the original path appended
    var path = window.location.pathname;
    // Remove the base path '/dnd-tools-react/' to get the route
    var basePath = '/dnd-tools-react/';
    if (path.startsWith(basePath)) {
      path = path.substring(basePath.length);
    }
    // Redirect to index.html with the route appended
    window.location.href = '/dnd-tools-react/index.html' + (path || '');
  </script>
</head>
<body>
  <h1>Page Not Found</h1>
  <p>Please use the navigation menu or go to the home page.</p>
</body>
</html>
